name: Check prices and surf sessions

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes; each script self-skips outside its active hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitors
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run Yango monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AUTH_B64: ${{ secrets.AUTH_B64 }}
        run: python monitor.py

      - name: Run Surf Park monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_srf.py

      - name: Commit updated state
        run: |
          git config user.name "monitor-bot"
          git config user.email "monitor-bot@users.noreply.github.com"
          changed=0
          for f in state.json srf_state.json; do
            if [[ -f "$f" && -n "$(git status --porcelain "$f")" ]]; then
              git add "$f"
              changed=1
            fi
          done
          if [[ $changed -eq 1 ]]; then
            git commit -m "chore: update state [skip ci]"
            git push
          else
            echo "No state changes."
          fi
